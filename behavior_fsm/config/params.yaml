# Parametros del guardian (Parte B) — ETAPA 1: wall-following + giro
#
# Ejecutar:
#   ros2 launch behavior_fsm capytown.launch.py

behavior_fsm:
  ros__parameters:

    lidar_front_deg: 180.0
    sector_frontal_deg: 30.0
    sector_lateral_lo:  60.0
    sector_lateral_hi: 120.0

    # --- Deteccion de caja ---
    detect_half_deg:  20.0
    detect_max_r:     0.45
    perp_std_max:     0.04
    box_w_min:        0.08
    box_w_max:        0.23
    min_box_pts:      5

    # --- Distancias ---
    dist_alerta:        0.45
    dist_pared_lateral: 0.55
    dist_emergencia:    0.12

    # --- Velocidad unica para todos los estados ---
    vel_crucero:      0.14   # m/s
    vel_giro_gradual: 0.40   # rad/s  giro izquierda

    # --- Repulsion pared izquierda ---
    dist_izq_min: 0.15
    Kizq:         3.0

    # --- Temporizacion ---
    t_giro_min: 1.2          # s  tiempo fijo de giro (~27 grados a 0.40 rad/s)
    t_giro_max: 4.0          # s  salvavidas
    t_cooldown: 3.0          # s  cooldown post-GIRO

wall_follower:
  ros__parameters:
    dist_objetivo:   0.08
    Kp:              0.80
    Kd:              0.10
    max_correccion:  0.40
    min_long_pared:  0.60
    cos_lateral_min: 0.55
    umbral_split:    0.06
    rango_max:       3.50
    salto_dist:      0.35
    salto_idx:       5
