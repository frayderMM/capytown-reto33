# Parámetros del Guardián (Parte B) — versión corregida.
# El guardián integra percepción + seguimiento de pared + FSM en UN nodo.
# wall_follower es solo depuración opcional (usa el mismo bloque de abajo).

behavior_fsm:
  ros__parameters:
    # --- Orientación del LiDAR ---
    lidar_front_deg: 180.0      # frente del MS200 Yahboom (cable atrás)
    excluir_atras_deg: 60.0     # cono trasero ignorado (cable/soporte ~12 cm)
    # remove_min_deg: 135.0     # zona angular extra a ignorar (marco robot)
    # remove_max_deg: 225.0
    rango_max: 3.5              # m distancia máxima a procesar

    # --- Offsets LiDAR -> borde físico del robot (medidos en el chasis) ---
    offset_frente: 0.15
    offset_atras:  0.10
    offset_lados:  0.08

    # --- Clustering / Split-and-Merge / clasificación ---
    salto_dist: 0.09            # m salto euclidiano que separa clusters
    salto_idx: 5                # huecos de índice para cortar cluster
    umbral_split: 0.04          # m tolerancia de rectitud (S&M)
    min_puntos: 4
    lado_caja_max: 0.32         # m lado máx de caja (20 cm + tol; diag 28 cm)
    lado_caja_linea: 0.22       # m corte por LÍNEA individual (viz): ≤esto
                                # naranja (caja), mayor azul (pared) — sin la
                                # tolerancia de diagonal de lado_caja_max, ya
                                # que una línea es un lado real, no el bbox
    min_long_pared: 0.45        # m lado mínimo de pared
    cos_lateral_min: 0.55
    votos_clase: 5              # barridos del voto por mayoría (anti-ruido)

    # --- Seguimiento de pared DERECHA ---
    dist_pared: 0.06            # m holgura LADO del robot -> pared
                                # (LiDAR queda a 0.15+0.08=0.23 m; jirón 60 cm)
    Kp: 0.8
    Kd: 0.05
    Ka: 0.5                     # ganancia de alineación angular con la pared
    max_w: 0.45                 # rad/s saturación
    max_delta_w: 0.08           # rad/s por ciclo (anti-zigzag)

    # --- FSM / velocidades (distancias frontales POST-OFFSET: borde real) ---
    vel_crucero: 0.15
    vel_min: 0.07
    w_giro: 0.5                 # rad/s en giros de esquina y rodeo
    vel_giro_arco: 0.04         # m/s para que el rodeo no pivote tan cerrado
    dist_alerta: 0.35           # m entra a CAJA_DETECTADA
    dist_parada: 0.17           # m se detiene frente a la caja (reto: >= 0.15)
    dist_esquina: 0.08          # m borde -> pared frontal para girar 90° izq
                                # (tras el giro la pared queda a ~0.20+0.15=0.35
                                #  del LiDAR y el PD converge a 0.23)
    dist_emergencia: 0.04
    espera_seg: 10.0
    ang_rodeo_deg: 50.0
    avance_diag: 0.42           # m diagonal: abre el rodeo antes de pasar
    avance_paralelo: 0.65       # m recto para pasar la caja (20 cm + robot + margen)
    cooldown_esquina: 2.0       # s sin re-disparar giro de esquina
    topic_odom: '/odom_raw'     # odometría del yahboom_driver

wall_follower:
  ros__parameters:
    lidar_front_deg: 180.0
    excluir_atras_deg: 60.0
    rango_max: 3.5
    salto_dist: 0.09
    salto_idx: 5
    umbral_split: 0.04
    min_puntos: 4
    lado_caja_max: 0.32
    min_long_pared: 0.45
    cos_lateral_min: 0.55
    dist_pared: 0.06
    offset_lados: 0.08
    Kp: 0.8
    Kd: 0.05
    Ka: 0.5
    max_w: 0.45
    max_delta_w: 0.08
