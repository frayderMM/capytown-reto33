# Parametros del guardian — CRUCERO / GIRO
#
# Logica:
#   1. Siempre pegado a la pared derecha (wall_follower).
#   2. Obstaculo al frente < dist_giro  → GIRO izquierda.
#   3. Supera limite (frente o izq < dist_parar) → PARA.
#
# Ejecutar:
#   ros2 launch behavior_fsm capytown.launch.py

behavior_fsm:
  ros__parameters:

    # --- Orientacion del LiDAR ---
    lidar_front_deg: 180.0      # 180 = Yahboom MS200 montado con cable atras

    # --- Sector frontal (ancho del cono de deteccion) ---
    sector_frontal_deg: 30.0

    # --- Sectores laterales (para dist_izq y dist_der) ---
    sector_lateral_lo:  60.0
    sector_lateral_hi: 120.0

    # --- Umbrales de distancia ---
    dist_parar:   0.20  # m  PARA inmediato si frente o izq < esto
    dist_giro:    0.35  # m  GIRO si frente < esto
    dist_izq_min: 0.10  # m  repulsion si izquierda < esto

    # --- Velocidad (misma en todos los estados) ---
    vel_crucero:      0.10  # m/s  avance
    vel_giro_gradual: 0.40  # rad/s  giro izquierda

    # --- Ganancia repulsion pared izquierda ---
    Kizq: 4.0

    # --- Temporizacion ---
    t_giro_min: 1.2   # s  minimo en GIRO antes de evaluar salida
    t_giro_max: 4.0   # s  salvavidas: fuerza salida a CRUCERO
    t_cooldown:  2.0  # s  cooldown post-GIRO (evita re-deteccion inmediata)

wall_follower:
  ros__parameters:
    dist_objetivo:   0.08
    Kp:              0.80
    Kd:              0.10
    max_correccion:  0.40
    min_long_pared:  0.60
    cos_lateral_min: 0.55
    umbral_split:    0.06
    rango_max:       3.50
    salto_dist:      0.35
    salto_idx:       5
