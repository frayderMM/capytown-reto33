# Guardian v4 (RC3) — CRUCERO / GIRO / RODEO / RETROCESO
#
# Flujo: CRUCERO → GIRO (elige lado con más espacio, según dist_izq/dist_der
# de wall_follower) → RODEO (recto, sale por sensor cuando el frente
# despeja) → CRUCERO. (cualquier estado) → RETROCESO → CRUCERO si el STOP
# absoluto se dispara (choque). dist_izq/dist_der NO se calculan en
# behavior_fsm: los publica wall_follower (RANSAC sobre las paredes laterales).
#
# La clasificación caja/pared (percepcion.py) corre en paralelo solo para
# poblar /guardian/debug (panel de lidar_viz.py) — no decide el movimiento.

behavior_fsm:
  ros__parameters:
    lidar_front_deg:    180.0
    sector_frontal_deg:  30.0
    t_espera_inicio:     10.0  # s  cuenta regresiva antes de arrancar

    # Parada absoluta
    d_stop_front:   0.14   # m  14 cm frente
    d_stop_lateral: 0.06   # m  6 cm costado (aplica a izq y a der por igual)

    # Umbrales frontales
    d_giro:         0.28   # m  trigger GIRO
    d_front_inicio: 0.40   # m  inicio evasión frontal

    # Tracking pared derecha (distancia RANSAC + heading del segmento
    # clasificado por percepcion.py, borde exterior)
    target_der: 0.17
    Kder:       2.6
    Kd_der:     0.3
    K_alpha:    1.0    # ganancia del heading (ángulo del segmento vs. avance)
    min_long_pared_pd:  0.30  # m mínimo del segmento de referencia
    cos_lateral_min_pd: 0.55  # |dx|/L mínimo ("va a lo largo de x")

    # Repulsión pared izquierda
    d_izq_min: 0.15
    Kizq:      4.0

    # Evasión frontal
    Kfront: 2.0

    # Velocidad
    vel_crucero:      0.10
    vel_maniobra:     0.035  # lineal en GIRO/RODEO: reducida para recorrer
                             # menos distancia "a ciegas" durante el giro
    vel_giro_gradual: 0.40
    max_w:            0.60

    # Temporización / geometría de GIRO y RODEO
    t_giro_min:         0.7   # s  giro mínimo
    t_giro_max:         2.0   # s  salvavidas — si no resuelve, retrocede en vez de
                              # seguir girando (acota el giro a ~70° en un intento)
    d_lado_salida_giro: 0.20  # m  sale de GIRO si el lado hacia el que gira < 20cm
                              # (medido crudo/sin RANSAC, ver behavior_fsm.py)
    k_urgencia_giro:    1.2   # amplifica el giro si el obstáculo está muy cerca de d_giro
    t_rodeo_min:        0.4   # s  mínimo recto tras GIRO antes de evaluar salida
    t_rodeo_max:        1.0   # s  salvavidas — RODEO es ciego (w=0)
    t_cooldown:         2.0   # s  cooldown post-RODEO
    t_recuperacion:     1.5   # s  suprime evasión frontal tras RODEO

    # Retroceso tras un choque (STOP absoluto)
    dist_retroceso: 0.15      # m  retrocede esto tras un choque
    vel_retroceso:  0.08      # m/s magnitud del retroceso (t_retroceso = dist/vel)
    w_retroceso:    0.42      # rad/s giro de corrección durante el retroceso,
                              # hacia el lado con más espacio (crudo, igual
                              # criterio que GIRO) para quedar ya encarado
                              # hacia el lado libre al reintentar

    topic_odom: '/odom_raw'   # odometría del yahboom_driver (trail + censo vivo del panel)

    # --- Clasificación caja/pared (solo para /guardian/debug, no mueve el robot) ---
    excluir_atras_deg: 60.0     # cono trasero ignorado (cable/soporte ~12 cm)
    rango_max_clasif: 3.5       # m distancia máxima a procesar
    offset_frente: 0.15
    offset_lados:  0.08
    salto_dist: 0.09            # m salto euclidiano que separa clusters
    salto_idx: 5                # huecos de índice para cortar cluster
    umbral_split: 0.04          # m tolerancia de rectitud (S&M)
    min_puntos: 4
    lado_caja_max: 0.32         # m lado máx de caja para el bbox del cluster (20 cm + tol)
    lado_caja_linea: 0.22       # m corte por LÍNEA individual (viz): ≤esto
                                # naranja (caja), mayor azul (pared) — sin la
                                # tolerancia de diagonal de lado_caja_max, ya
                                # que una línea es un lado real, no el bbox

# wall_follower — paredes laterales por RANSAC (reemplaza Split-and-Merge).
# Publica /dist_izq y /dist_der; behavior_fsm los consume, no los recalcula.
wall_follower:
  ros__parameters:
    lidar_front_deg:    180.0
    sector_frontal_deg:  30.0   # excluido del ajuste de pared (zona de obstáculos)
    sector_lateral_lo:   60.0   # ventana estrecha del fallback (cerca de perpendicular)
    sector_lateral_hi:  120.0
    sector_trasero_deg: 160.0   # excluido del ajuste (posible otra pared tras un giro)
    rango_max:            3.50  # m  ignora lecturas más lejanas

    umbral_inlier_ransac: 0.03  # m  tolerancia de inlier
    iteraciones_ransac:   80
    min_inliers_ransac:   12
    min_puntos_lado:      15    # puntos mínimos en el lado para intentar RANSAC
    semilla_ransac:       -1    # -1 = aleatorio real; >=0 = reproducible (defensa/debug)

    ema_alpha: 0.5              # suavizado temporal de dist_izq/dist_der

    ancho_jiron:     0.60       # m  ancho esperado del jirón (chequeo de consistencia)
    tol_ancho_jiron: 0.15       # m  tolerancia antes de advertir
