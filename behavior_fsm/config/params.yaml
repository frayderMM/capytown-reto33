# Guardian v3 — CRUCERO / GIRO / RODEO
#
# Flujo: CRUCERO → GIRO (gira izq) → RODEO (recto, w=0) → CRUCERO
# El RODEO crea separacion del obstaculo antes de retomar tracking.

behavior_fsm:
  ros__parameters:

    lidar_front_deg:    180.0
    sector_frontal_deg:  30.0
    sector_lateral_lo:   60.0
    sector_lateral_hi:  120.0

    # Parada absoluta
    d_stop_front:   0.14   # m  14 cm frente
    d_stop_lateral: 0.06   # m  6 cm costado

    # Umbrales frontales
    d_giro:         0.30   # m  trigger GIRO
    d_front_inicio: 0.40   # m  inicio evasion frontal

    # Tracking pared derecha
    # target_der 17cm: robot consistente a 17-20cm, 13cm generaba overcorreccion
    # Kder 2.0: radio giro = v/w = 0.10/(2.0*0.04) = 1.25m (amplio, no espiral)
    target_der: 0.17
    Kder:       2.0

    # Repulsion pared izquierda
    d_izq_min: 0.15
    Kizq:      4.0

    # Evasion frontal
    Kfront: 2.0

    # Velocidad
    vel_crucero:      0.10
    vel_giro_gradual: 0.50
    max_w:            0.60

    # Temporizacion
    t_giro_min:        0.8   # s  giro minimo (~23 deg)
    t_giro_max:        4.0   # s  salvavidas
    d_izq_salida_giro: 0.20  # m  sale de GIRO si izq < 20cm
    t_rodeo:           1.0   # s  avance recto tras GIRO (10 cm separacion)
    t_cooldown:        2.0   # s  cooldown post-RODEO
    t_recuperacion:    1.5   # s  suprime w_front tras RODEO

wall_follower:
  ros__parameters:
    dist_objetivo:   0.08
    Kp:              0.80
    Kd:              0.10
    max_correccion:  0.40
    min_long_pared:  0.60
    cos_lateral_min: 0.55
    umbral_split:    0.06
    rango_max:       3.50
    salto_dist:      0.35
    salto_idx:       5
