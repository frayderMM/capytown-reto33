# Parametros del guardian (Parte B).
# Lanza los dos nodos con:
#   ros2 run behavior_fsm behavior_fsm  --ros-args --params-file params.yaml
#   ros2 run behavior_fsm wall_follower --ros-args --params-file params.yaml

behavior_fsm:
  ros__parameters:
    sector_frontal_deg: 45.0    # grados - sector frontal +/- vigilado
    dist_alerta: 0.30           # m  - entra a EVASION
    dist_parada: 0.15           # m  - frena el avance (sigue girando hacia la izq)
    vel_crucero: 0.15           # m/s
    vel_evasion: 0.08           # m/s  - avance reducido mientras evade
    w_evasion_max: 0.6          # rad/s - giro maximo hacia la izquierda (a dist_parada)

wall_follower:
  ros__parameters:
    # --- Metodo de 2 haces: paralelo a la pared DERECHA ---
    angulo_frente_deg: -50.0      # deg  haz adelantado (entre frente y derecha)
    angulo_derecha_deg: -90.0     # deg  haz perpendicular a la derecha
    ventana_busqueda_deg: 3.0     # deg  +/- para buscar lectura valida cerca del angulo objetivo
    Kp: 1.0                       # ganancia: alpha (rad) -> w (rad/s)
    signo_correccion: 1.0         # +1.0 o -1.0 -- AJUSTAR en la prueba estatica segun hacia
                                  # donde gire realmente el robot
    max_correccion: 0.40          # rad/s  saturacion de la salida
    umbral_paralelo_deg: 3.0      # deg  por debajo de esto se considera "ya paralelo"
    log_cada_seg: 0.5             # s  periodo del log de estado en consola
