# Parametros Guardian v2 — CRUCERO / GIRO
#
# Control:
#   w = w_der * factor + w_front + w_izq
#   factor: 1.0 cuando frente libre, baja a 0.0 en d_giro (evita que w_der pelee con w_front)
#
# Zonas frente:
#   > 0.45m  → tracking pared derecha puro
#   0.30-0.45m → tracking atenuado + correccion frontal gradual
#   < 0.30m  → GIRO (w_der=0, solo giro izq)
#   < 0.08m  → PARADA absoluta
#
# Zonas izquierda:
#   > 0.15m  → sin repulsion
#   < 0.15m  → repulsion proporcional
#   < 0.08m  → PARADA absoluta

behavior_fsm:
  ros__parameters:

    # LiDAR
    lidar_front_deg:    180.0
    sector_frontal_deg:  30.0
    sector_lateral_lo:   60.0
    sector_lateral_hi:  120.0

    # Parada absoluta
    d_stop_front:   0.14   # m  para si frente < 14 cm
    d_stop_lateral: 0.06   # m  para si izq < 6 cm

    # Umbrales de accion frontal
    d_giro:         0.30   # m  trigger GIRO
    d_front_inicio: 0.40   # m  inicio correccion frontal (45cm causaba w_front en recuperacion)

    # Control pared derecha
    target_der: 0.13        # m  objetivo (rango ideal 10-16 cm)
    Kder:       4.0         # ganancia

    # Repulsion pared izquierda
    d_izq_min: 0.15         # m  inicio repulsion
    Kizq:      4.0

    # Correccion frontal gradual
    Kfront: 2.0             # antes 1.2, aumentado para superar w_der mas rapido

    # Velocidad
    vel_crucero:      0.10  # m/s
    vel_giro_gradual: 0.50  # rad/s  giro en GIRO
    max_w:            0.60  # rad/s  cap angular

    # Temporizacion
    t_giro_min:      1.2    # s
    t_giro_max:      4.0    # s
    t_cooldown:      2.0    # s
    t_recuperacion:  1.5    # s  suprime w_front tras GIRO para recuperar alineacion

wall_follower:
  ros__parameters:
    dist_objetivo:   0.08
    Kp:              0.80
    Kd:              0.10
    max_correccion:  0.40
    min_long_pared:  0.60
    cos_lateral_min: 0.55
    umbral_split:    0.06
    rango_max:       3.50
    salto_dist:      0.35
    salto_idx:       5
