# Parametros Guardian v2 — CRUCERO / GIRO
#
# Control:
#   w = w_der(tracking pared der) + w_front(correccion gradual frente) + w_izq(repulsion)
#
# Zonas de distancia (frente):
#   > 0.40m  → solo tracking pared derecha, sin correccion frontal
#   0.22-0.40m → tracking + correccion frontal gradual proporcional
#   < 0.22m  → GIRO izquierda
#   < 0.08m  → PARADA absoluta
#
# Zonas distancia (izquierda):
#   > 0.15m  → sin repulsion
#   < 0.15m  → repulsion proporcional hacia la derecha
#   < 0.05m  → PARADA absoluta

behavior_fsm:
  ros__parameters:

    # LiDAR
    lidar_front_deg:    180.0
    sector_frontal_deg:  30.0
    sector_lateral_lo:   60.0
    sector_lateral_hi:  120.0

    # Parada absoluta (zona de crash real)
    d_stop_front:   0.08   # m  para si frente < 8 cm
    d_stop_lateral: 0.05   # m  para si izq < 5 cm

    # Umbrales de accion frontal
    d_giro:         0.22   # m  trigger GIRO (llave izquierda)
    d_front_inicio: 0.40   # m  inicio correccion frontal gradual

    # Control pared derecha  (objetivo: 10-16 cm)
    target_der: 0.13        # m  punto objetivo (medio del rango 10-16 cm)
    Kder:       4.0         # ganancia: mayor = ajuste mas rapido

    # Repulsion pared izquierda
    d_izq_min: 0.15         # m  inicio de repulsion izquierda
    Kizq:      4.0

    # Correccion frontal gradual
    Kfront: 1.2             # ganancia: mayor = gira mas fuerte al acercarse

    # Velocidad
    vel_crucero:      0.10  # m/s  avance (todos los estados)
    vel_giro_gradual: 0.50  # rad/s  giro en estado GIRO
    max_w:            0.60  # rad/s  cap angular en CRUCERO

    # Temporizacion
    t_giro_min: 1.0         # s  minimo en GIRO antes de evaluar salida
    t_giro_max: 4.0         # s  salvavidas
    t_cooldown:  2.0        # s  cooldown post-GIRO

wall_follower:
  ros__parameters:
    dist_objetivo:   0.08
    Kp:              0.80
    Kd:              0.10
    max_correccion:  0.40
    min_long_pared:  0.60
    cos_lateral_min: 0.55
    umbral_split:    0.06
    rango_max:       3.50
    salto_dist:      0.35
    salto_idx:       5
