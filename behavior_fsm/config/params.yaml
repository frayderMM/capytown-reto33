# Parametros del guardian (Parte B) — version mejorada.
#
# Ejecutar:
#   ros2 run behavior_fsm behavior_fsm  --ros-args --params-file params.yaml
#   ros2 run behavior_fsm wall_follower --ros-args --params-file params.yaml

behavior_fsm:
  ros__parameters:

    # --- Orientación del LiDAR ---
    lidar_front_deg: 180.0      # ángulo donde está el FRENTE en el LiDAR
                                # 180 = Yahboom MS200 montado con cable atrás (por defecto)
                                # 0   = montaje estándar ROS
                                # CAMBIAR si el robot reacciona en dirección equivocada

    # --- Sectores ---
    sector_frontal_deg: 30.0    # +/- grados del cono frontal
    sector_lateral_lo:  60.0    # inicio sector lateral [grados]
    sector_lateral_hi: 120.0    # fin sector lateral [grados]

    # --- Offsets LiDAR -> borde fisico del robot (medidos en el chasis,
    # NO son iguales en cada direccion) -- todas las distancias del LiDAR
    # se corrigen con esto antes de comparar contra cualquier umbral ---
    offset_frente: 0.15          # m  LiDAR -> borde frontal
    offset_atras:  0.10          # m  LiDAR -> borde trasero
    offset_lados:  0.08          # m  LiDAR -> borde lateral

    # --- Distancias de reaccion (en espacio libre real, post-offset) ---
    dist_alerta:        0.45    # m  empieza a frenar y a anticipar el giro
    dist_obstaculo:      0.30    # m  giro a maxima intensidad
    dist_emergencia:    0.05    # m  margen real minimo antes del stop total

    # --- Velocidades ---
    vel_crucero:  0.18     # m/s  velocidad en zona libre
    vel_min:      0.05     # m/s  velocidad minima al estar a dist_obstaculo
    w_giro_max:   0.45     # rad/s  maximo aporte de giro por anticipacion
    w_max:        0.60     # rad/s  saturacion total (giro + repulsion lateral)

    # --- Repulsion lateral simetrica (izq Y der, evita rozar cualquier pared) ---
    dist_lado_alerta: 0.20      # m  empieza el taper progresivo
    dist_lado_min:    0.05      # m  margen real minimo a cualquier lado
    K_lado:           3.0       # ganancia de repulsion (rad/s por metro de exceso)

wall_follower:
  ros__parameters:
    # --- Control lateral ---
    dist_objetivo:  0.08        # m    distancia deseada a la pared DERECHA (objetivo 8 cm confirmado en pista)
    Kp:             0.80        # ganancia proporcional
    Kd:             0.10        # ganancia derivativa
    max_correccion: 0.40        # rad/s  saturación de salida

    # --- Clasificación de segmentos ---
    min_long_pared: 0.35        # m  longitud mínima para considerar un segmento pared
                                 # (bajado de 0.60: en pista la pared larga se fragmenta
                                 # por ruido/cajas y no llegaba a 0.60m -> sin correccion.
                                 # 0.35m sigue muy por encima del ancho de una caja ~0.15-0.25m)
    cos_lateral_min: 0.55       # cos del ángulo máximo con el eje X

    # --- Algoritmo Split-and-Merge ---
    umbral_split:   0.06        # m  tolerancia de rectitud
    rango_max:      3.50        # m  distancia máxima a procesar
    salto_dist:     0.35        # m  salto euclidiano para cortar grupo
    salto_idx:      5           # N  huecos de índice para cortar grupo

    # --- Zona angular ignorada (descomentar si el cable tapa el LiDAR) ---
    # remove_min_deg: 135.0
    # remove_max_deg: 225.0
