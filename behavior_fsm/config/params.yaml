# Parametros del guardian (Parte B) — version mejorada.
#
# Ejecutar:
#   ros2 run behavior_fsm behavior_fsm  --ros-args --params-file params.yaml
#   ros2 run behavior_fsm wall_follower --ros-args --params-file params.yaml

behavior_fsm:
  ros__parameters:

    # --- Orientación del LiDAR ---
    lidar_front_deg: 180.0      # ángulo donde está el FRENTE en el LiDAR
                                # 180 = Yahboom MS200 montado con cable atrás (por defecto)
                                # 0   = montaje estándar ROS
                                # CAMBIAR si el robot reacciona en dirección equivocada

    # --- Sector frontal de vigilancia ---
    sector_frontal_deg: 45.0    # +/- grados al frente vigilados

    # --- Sectores laterales (para elegir dirección de rodeo) ---
    sector_lateral_lo:  60.0    # inicio sector lateral [grados]
    sector_lateral_hi: 120.0    # fin sector lateral [grados]

    # --- Distancias de reacción ---
    dist_alerta: 0.45           # m  empieza a frenar progresivamente
    dist_parada: 0.25           # m  para completamente

    # --- Velocidades ---
    vel_crucero: 0.18           # m/s  velocidad en zona libre
    vel_min:     0.05           # m/s  velocidad mínima al estar a dist_parada
    vel_giro:    0.80           # rad/s  velocidad de giro en evasion

    # --- Pausa de estabilización antes de evadir ---
    pausa_parada: 0.30          # s  pausa breve al detectar obstaculo

    # --- Contingencia de colisión ---
    dist_emergencia: 0.12       # m  stop total si el frente esta a menos de esto (override)

    # --- Gap navigation (evasion dinamica por huecos) ---
    Kgap:           1.2         # rad/s por radian de gap (ganancia de giro hacia el hueco)
    gap_sector_deg: 90.0        # ventana de busqueda del hueco [+-grados desde el frente]
    t_evasion_max:  8.0         # s  timeout de seguridad en estado EVADIR

    # --- Recuperacion (RESCATE: barrido + retroceso si EVADIR se atasca) ---
    topic_odom: '/odom'            # topico de odometria del yahboom_driver
    gap_fallback_deg: 15.0         # deg  margen para usar fallback lateral en EVADIR
    barrido_max_deg: 300.0         # deg  giro acumulado max en fase BARRIDO antes de retroceder
    barrido_t_max: 10.0            # s    limite de seguridad (reloj) para fase BARRIDO
    vel_retroceso: 0.08            # m/s  velocidad de reversa en RETROCEDER
    retroceso_dist: 0.25           # m    distancia objetivo de reversa
    retroceso_t_max: 3.0           # s    limite de seguridad (reloj) para RETROCEDER
    dist_seguridad_retroceso: 0.20 # m    distancia trasera minima para permitir retroceso

wall_follower:
  ros__parameters:
    # --- Control lateral ---
    dist_objetivo:  0.18        # m    distancia deseada a la pared DERECHA (jiron de 60cm de ancho — ajustar en pista real)
    Kp:             0.80        # ganancia proporcional
    Kd:             0.10        # ganancia derivativa
    max_correccion: 0.40        # rad/s  saturación de salida

    # --- Clasificación de segmentos ---
    min_long_pared: 0.60        # m  longitud mínima para considerar un segmento pared
    cos_lateral_min: 0.55       # cos del ángulo máximo con el eje X

    # --- Algoritmo Split-and-Merge ---
    umbral_split:   0.06        # m  tolerancia de rectitud
    rango_max:      3.50        # m  distancia máxima a procesar
    salto_dist:     0.35        # m  salto euclidiano para cortar grupo
    salto_idx:      5           # N  huecos de índice para cortar grupo

    # --- Zona angular ignorada (descomentar si el cable tapa el LiDAR) ---
    # remove_min_deg: 135.0
    # remove_max_deg: 225.0
