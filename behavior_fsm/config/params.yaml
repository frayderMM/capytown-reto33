# Guardian v6 — CRUCERO / AVISO / GIRO — sigue la pared IZQUIERDA
#
# Flujo: CRUCERO → AVISO (detenido t_aviso segundos, anuncia "CAJA") →
# GIRO (avanza girando una duracion FIJA t_giro_fijo, sordo a nueva
# deteccion durante esa ventana) → CRUCERO (recalibra contra la pared
# izquierda).
# dist_izq / dist_der ya NO se calculan aqui: los publica wall_follower
# (Split-and-Merge + minimos cuadrados sobre las paredes laterales, con
# casi todo el barrido del LiDAR, simetrico para ambos lados) en
# /dist_izq y /dist_der.

behavior_fsm:
  ros__parameters:

    lidar_front_deg:    180.0
    sector_frontal_deg:  30.0
    t_espera_inicio:     10.0  # s  cuenta regresiva tras ENTER antes de arrancar

    # Parada absoluta
    d_stop_front:   0.14   # m  14 cm frente
    d_stop_lateral: 0.06   # m  6 cm costado (aplica a izq y a der por igual)

    # Umbrales frontales
    d_giro:         0.30   # m  trigger GIRO
    d_front_inicio: 0.40   # m  inicio evasion frontal

    # Tracking pared IZQUIERDA (cambio de diseño: antes era la derecha)
    # target_izq 17cm: mismo valor que tenia target_der, ya probado.
    # Kizq/Kd_izq: mismos valores que tenia Kder/Kd_der (ganancia probada).
    target_izq: 0.17
    Kizq:       2.6
    Kd_izq:     0.3

    # Repulsion pared DERECHA (antes izquierda), como respaldo
    d_der_min: 0.15
    Kder:      4.0

    # Evasion frontal
    Kfront: 2.0

    # Velocidad
    vel_crucero:      0.10
    vel_maniobra:     0.07   # lineal durante GIRO: mas lento que crucero
    vel_giro_gradual: 0.55   # angular durante GIRO (fija, no se recalcula)
    max_w:            0.60

    # AVISO + GIRO de duracion fija
    t_aviso:     1.0   # s  detenido anunciando "CAJA" antes de girar
    t_giro_fijo: 5.0   # s  giro de duracion fija; sordo a nueva deteccion
                       # de caja durante toda la ventana (evita que se
                       # re-dispare AVISO por seguir viendo la caja/pared
                       # de cerca mientras gira alrededor de ella)
    t_cooldown:      2.0   # s  cooldown post-GIRO antes de poder disparar otro AVISO
    t_recuperacion:  1.5   # s  suprime w_front tras GIRO, solo w_izq (recalibra)

# wall_follower — paredes laterales por Split-and-Merge + minimos
# cuadrados (antes RANSAC: en la practica daba peor resultado por el
# muestreo aleatorio, que variaba de cuadro a cuadro con la pared
# quieta). Split-and-Merge separa la pared de una caja que la interrumpe
# de forma deterministica, sin aleatoriedad.
# Publica /dist_izq y /dist_der; behavior_fsm los consume, no los recalcula.
wall_follower:
  ros__parameters:
    lidar_front_deg:    180.0
    sector_frontal_deg:  30.0   # excluido del ajuste de pared (zona de obstaculos)
    sector_lateral_lo:   60.0   # ventana estrecha del fallback (cerca de perpendicular)
    sector_lateral_hi:  120.0
    sector_trasero_deg: 160.0   # excluido del ajuste (posible otra pared tras un giro)
    rango_max:            3.50  # m  ignora lecturas mas lejanas

    # Split-and-Merge
    umbral_split:        0.05   # m  tolerancia de rectitud (split si se pasa)
    salto_dist:           0.20  # m  salto euclidiano = discontinuidad de objeto (pre-segmentacion)
    salto_idx:                5 # huecos de indice = discontinuidad (pre-segmentacion)
    min_puntos_segmento:      4 # puntos minimos para que un segmento sobreviva
    min_long_pared:        0.35 # m  longitud minima para ser "pared" (caja mide ~0.20-0.23m)

    ema_alpha: 0.5              # suavizado temporal de dist_izq/dist_der

    ancho_jiron:     0.60       # m  ancho esperado del jiron (chequeo de consistencia)
    tol_ancho_jiron: 0.15       # m  tolerancia antes de advertir
