# Parametros del guardian (Parte B) — CRUCERO / GIRO / RODEO
#
# Ejecutar:
#   ros2 launch behavior_fsm capytown.launch.py

behavior_fsm:
  ros__parameters:

    # --- Orientacion del LiDAR ---
    lidar_front_deg: 180.0      # 180 = Yahboom MS200 montado con cable atras

    # --- Sector emergencia (ancho) ---
    sector_frontal_deg: 30.0

    # --- Sectores laterales ---
    sector_lateral_lo:  60.0
    sector_lateral_hi: 120.0

    # --- Deteccion de caja (mismo criterio que lidar_viz.py v7) ---
    detect_half_deg:  20.0   # sector de busqueda [deg, semiangulo]
    detect_max_r:     0.45   # m  rango maximo para considerar un punto
    perp_std_max:     0.04   # m  max std de profundidad (superficie perpendicular)
    box_w_min:        0.08   # m  ancho minimo de la caja
    box_w_max:        0.23   # m  ancho maximo (>= se descarta, es pared)
    min_box_pts:      5      # puntos minimos para considerar deteccion valida

    # --- Distancias de reaccion ---
    dist_alerta:        0.45  # m  frente libre para salir de GIRO o RODEO
    dist_pared_lateral: 0.55  # m  pared derecha reapareció (umbral salida RODEO)
    dist_emergencia:    0.12  # m  stop total (override de cualquier estado)

    # --- Velocidades ---
    vel_crucero:      0.14   # m/s  velocidad en CRUCERO (reducida para mas control)
    vel_giro_gradual: 0.40   # rad/s  giro izquierda en GIRO
    vel_avance_giro:  0.06   # m/s  avance lineal mientras gira

    # --- RODEO: avance recto para pasar junto a la caja ---
    t_rodeo:  1.5            # s   tiempo maximo en RODEO
    v_rodeo:  0.13           # m/s velocidad en RODEO
    w_rodeo:  0.0            # rad/s angular en RODEO (0.0 = recto; <0 = curva a la derecha)

    # --- Temporizacion del giro ---
    # t_giro_min es el tiempo FIJO de giro. El GIRO sale por tiempo, no por dist_frente,
    # porque la pared izq entra al cono frontal y bloquearia la salida por distancia.
    # 1.2s x 0.40 rad/s = 0.48 rad ≈ 27 grados de giro
    t_giro_min: 1.2          # s  tiempo fijo de giro (ajustar segun angulo necesario)
    t_giro_max: 4.0          # s  salvavidas

    # --- Cooldown post-maniobra (GIRO+RODEO) ---
    # Una vez completada la maniobra, no puede detectar otra caja hasta pasado este tiempo.
    # 3s x 0.14 m/s = ~42 cm de recorrido libre antes de poder re-detectar.
    t_cooldown: 3.0          # s  cooldown post-GIRO/RODEO

    # --- Repulsion pared izquierda ---
    dist_izq_min: 0.15       # m  distancia minima a la pared izquierda
    Kizq:         3.0        # ganancia de repulsion [rad/s por metro de exceso]

wall_follower:
  ros__parameters:
    dist_objetivo:   0.08
    Kp:              0.80
    Kd:              0.10
    max_correccion:  0.40
    min_long_pared:  0.60
    cos_lateral_min: 0.55
    umbral_split:    0.06
    rango_max:       3.50
    salto_dist:      0.35
    salto_idx:       5
