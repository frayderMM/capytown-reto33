# Parámetros del censo de cajas (Parte A) — versión corregida.

box_detector:
  ros__parameters:
    # --- Orientación del LiDAR ---
    lidar_front_deg: 180.0      # frente del MS200 Yahboom (cable atrás)
    excluir_atras_deg: 60.0     # cono trasero ignorado (cable/soporte)

    # --- Clustering ---
    umbral_salto: 0.09          # m salto euclidiano que separa clusters
    salto_idx: 5

    # --- Split-and-Merge / validación de caja por LADOS ---
    umbral_split: 0.04          # m tolerancia de rectitud
    min_puntos: 4
    lado_caja_min: 0.08         # m lado visible mínimo
    lado_caja_max: 0.32         # m lado máx (caja 20 cm + tol; diagonal 28 cm)
                                # cualquier lado > esto = pared -> se descarta

    # --- Alcance / deduplicación ---
    rango_max_deteccion: 2.5    # m ignora candidatos más lejanos
    dist_duplicado: 0.45        # m dos detecciones < esto = la misma caja
    confirmaciones_caja: 3      # lecturas repetidas antes de censar
    max_cajas: 8                # tope anti-falsos positivos acumulados

    # --- Odometría ---
    topic_odom: '/odom_raw'     # confirmado con ros2 topic hz

metrics_logger:
  ros__parameters:
    # Ground-truth en marco odom como lista plana [x1,y1, x2,y2, ...]
    # ACTUALIZAR antes de cada corrida con las posiciones reales de las 5 cajas
    ground_truth: [1.0, 0.5, 2.0, -0.5, 3.0, 0.4]
    tolerancia_match: 0.30
    corrida: 0                  # 0 = autonumerar
    archivo_csv: '~/metricas_lidar.csv'
