box_detector:
  ros__parameters:
    jump_threshold: 0.12      # [m] salto de rango para abrir nuevo cluster
    box_min_width:  0.08      # [m] ancho mínimo (caja 20cm vista en ángulo ~14cm)
    box_max_width:  0.30      # [m] ancho máximo (caja 20cm + margen)
    box_min_points: 3         # puntos mínimos por cluster
    box_max_points: 40        # puntos máximos (paredes tienen muchos más)
    max_range:      2.0       # [m] jirón de 60cm — no hay nada más lejos que 2m

behavior_fsm:
  ros__parameters:
    cruise_speed:     0.22    # [m/s] velocidad de avance normal
    alert_distance:   0.50    # [m] detectar caja con mas margen
    stop_distance:    0.22    # [m] parar a 22cm (holgura sobre los 15cm del reto)
    alert_angle_deg:  25.0    # [°] cono frontal estrecho — evita disparos de paredes laterales
    side_angle_deg:   80.0    # [°] semisector lateral para elegir lado libre
    bypass_angle_deg: 30.0    # [°] angulo de giro en el rodeo
    bypass_forward:   0.60    # [m] avance para sobrepasar la caja de 20cm con margen
    bypass_speed:     0.12    # [m/s] velocidad durante el rodeo
    turn_speed:       0.45    # [rad/s] velocidad angular en giros
