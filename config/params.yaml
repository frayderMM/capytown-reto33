box_detector:
  ros__parameters:
    jump_threshold: 0.12      # [m] salto de rango para abrir nuevo cluster
    box_min_width:  0.08      # [m] ancho mínimo (caja 20cm vista en ángulo ~14cm)
    box_max_width:  0.30      # [m] ancho máximo (caja 20cm + margen)
    box_min_points: 3         # puntos mínimos por cluster
    box_max_points: 40        # puntos máximos (paredes tienen muchos más)
    max_range:      2.0       # [m] jirón de 60cm — no hay nada más lejos que 2m

behavior_fsm:
  ros__parameters:
    cruise_speed:     0.15    # [m/s] velocidad de avance normal
    alert_distance:   0.35    # [m] distancia que activa CAJA_DETECTADA
    stop_distance:    0.17    # [m] distancia mínima de parada (≥15 cm del reto)
    alert_angle_deg:  40.0    # [°] semisector frontal vigilado
    side_angle_deg:   90.0    # [°] semisector lateral para elegir lado libre
    bypass_angle_deg: 32.0    # [°] ángulo de giro (ajustado para jirón de 60 cm)
    bypass_forward:   0.55    # [m] avance — caja 20cm + holgura para sobrepasarla
    bypass_speed:     0.10    # [m/s] velocidad durante el rodeo
    turn_speed:       0.40    # [rad/s] velocidad angular en giros
