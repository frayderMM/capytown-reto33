box_detector:
  ros__parameters:
    jump_threshold: 0.12
    box_min_width:  0.13
    box_max_width:  0.25
    box_min_points: 5
    box_max_points: 30
    max_range:      0.80

behavior_fsm:
  ros__parameters:
    cruise_speed:     0.22    # [m/s] velocidad de avance
    center_kp:        0.8     # ganancia proporcional de centrado (neg si se invierte)
    corner_distance:  0.30    # [m] gira derecha si frente < 30cm y no hay caja
    clear_distance:   0.55    # [m] sale de GIRAR cuando frente > 55cm
    alert_distance:   0.50    # [m] detecta caja cuando frente < 50cm (con box_detector)
    alert_angle_deg:  40.0    # [°] semisector frontal (±40° de ±180°)
    side_lo_deg:      60.0    # [°] inicio sector lateral para centrado
    side_hi_deg:     120.0    # [°] fin sector lateral para centrado
    turn_speed:       0.45    # [rad/s] velocidad de giro en esquinas
    bypass_angle_deg: 18.0    # [°] giro al rodear caja
    bypass_forward:   0.45    # [m] avance al rodear caja
    bypass_speed:     0.10    # [m/s] velocidad al rodear
    bypass_cooldown:  2.5     # [s] cooldown post-rodeo o post-esquina
